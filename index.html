<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="title">Luis Retirement Invitation</h1>
    </header>

    <main class="container">
        <div class="image-wrapper">
            <img src="retirementcard4.png" alt="Retirement Party Invitation">
        </div>

        <form id="rsvpForm">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <fieldset style="width: 300px;">
        <legend>Will you be attending the event?</legend>

        <label>
            <input type="radio" name="answer" value="yes">
            Yes
        </label>

        <label>
            <input type="radio" name="answer" value="no">
            No
        </label>
    </fieldset>

    <label for="message">Extra Notes</label>
    <textarea id="message" name="notes" rows="1"></textarea>

    <button type="submit">Submit</button>
</form>

<script>
document.getElementById("rsvpForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        answer: document.querySelector("input[name='answer']:checked")?.value || "",
        notes: document.getElementById("message").value
    };

    await fetch("https://script.google.com/macros/s/AKfycby-yUXh4IAOZEwrZ6EF697LEYPfUXC_673UzT8tYO8b-LsXac_k4ErmU0csCSZ-XW1lSQ/exec", {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("Your response has been recorded!");
});
</script>
    </main>

</body>
</html>
